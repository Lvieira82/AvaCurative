{% extends 'base.html' %}

{% block title %}Novo Paciente{% endblock %}

{% block content %}

<div class="form-card profissional">

    <div class="form-title">
        <span class="icone">👤+</span>
        <h1>Cadastrar Paciente</h1>
    </div>

    <form method="post">
        {% csrf_token %}

        <label>Nome:</label>
        {{ form.nome }}

        <label>Endereço:</label>
        {{ form.endereco }}

        <label>Telefone:</label>
        {{ form.telefone }}

        <label>Data nascimento:</label>
        {{ form.data_nascimento }}

        <label>Origem:</label>
        {{ form.origem }}

        <label>Email:</label>
        {{ form.email }}

        <button type="submit">
            💾 Salvar Paciente
        </button>
    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const telefone = document.querySelector('input[name="telefone"]');

    if (!telefone) return;

    telefone.setAttribute("maxlength", "15");
    telefone.setAttribute("placeholder", "(75) 99999-9999");

    telefone.addEventListener("input", function(e) {

        let valor = e.target.value.replace(/\D/g, "");

        valor = valor.substring(0, 11);

        if (valor.length > 10) {
            valor = valor.replace(
                /^(\d{2})(\d{5})(\d{4}).*/,
                "($1) $2-$3"
            );
        } else if (valor.length > 6) {
            valor = valor.replace(
                /^(\d{2})(\d{5})(\d{0,4}).*/,
                "($1) $2-$3"
            );
        } else if (valor.length > 2) {
            valor = valor.replace(
                /^(\d{2})(\d+)/,
                "($1) $2"
            );
        } else if (valor.length > 0) {
            valor = valor.replace(
                /^(\d*)/,
                "($1"
            );
        }

        e.target.value = valor;
    });

});
</script>

{% endblock %}
